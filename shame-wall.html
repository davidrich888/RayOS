<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交易恥辱牆 — Trading Shame Wall</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .header {
    text-align: center;
    padding: 40px 20px 20px;
    border-bottom: 1px solid #1a1a1a;
  }
  .header h1 {
    font-size: 28px;
    color: #ff4444;
    text-shadow: 0 0 20px rgba(255, 68, 68, 0.3);
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .header .subtitle {
    color: #666;
    font-size: 13px;
    margin-top: 8px;
  }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 20px;
    border-bottom: 1px solid #1a1a1a;
    background: #0d0d0d;
  }
  .stat { text-align: center; }
  .stat-value {
    font-size: 24px;
    font-weight: bold;
    color: #ff4444;
  }
  .stat-label {
    font-size: 11px;
    color: #555;
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .warning-tape {
    background: repeating-linear-gradient(
      -45deg, #1a1a00, #1a1a00 10px, #0a0a0a 10px, #0a0a0a 20px
    );
    padding: 8px 0;
    overflow: hidden;
    border-bottom: 1px solid #333300;
    border-top: 1px solid #333300;
  }
  .warning-tape .scroll-text {
    display: inline-block;
    white-space: nowrap;
    animation: scroll 20s linear infinite;
    color: #ffcc00;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  @keyframes scroll {
    0% { transform: translateX(100vw); }
    100% { transform: translateX(-100%); }
  }

  .content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 30px 20px;
  }

  #entriesList {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .entry {
    background: #111;
    border: 1px solid #222;
    border-left: 3px solid #ff4444;
    border-radius: 6px;
    padding: 20px;
    margin-bottom: 0;
    transition: all 0.2s;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .entry:hover {
    border-left-color: #ff6666;
    background: #141414;
    box-shadow: 0 0 20px rgba(255, 68, 68, 0.05);
  }
  .entry-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .entry-date { font-size: 13px; color: #888; }
  .entry-loss {
    font-size: 20px;
    font-weight: bold;
    color: #ff4444;
    text-shadow: 0 0 10px rgba(255, 68, 68, 0.2);
  }
  .entry-loss.loss-positive {
    color: #4ade80;
    text-shadow: 0 0 10px rgba(74, 222, 128, 0.2);
  }
  .entry-title {
    font-size: 22px;
    color: #ff4444;
    font-weight: bold;
    margin-bottom: 10px;
    text-shadow: 0 0 10px rgba(255, 68, 68, 0.15);
    line-height: 1.3;
  }
  .entry-detail {
    font-size: 13px;
    color: #777;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .entry-detail mark {
    background: rgba(255, 230, 0, 0.35);
    color: #e0e0e0;
    padding: 1px 2px;
    border-radius: 2px;
  }
  .entry-detail img {
    max-width: 100%;
    max-height: 400px;
    border-radius: 4px;
    border: 1px solid #222;
    display: block;
    margin: 8px 0;
    cursor: pointer;
  }
  .entry-detail img:hover { border-color: #ff4444; }
  .entry.entry-good {
    border-left-color: #22c55e;
  }
  .entry.entry-good .entry-title {
    color: #4ade80;
    text-shadow: 0 0 10px rgba(74, 222, 128, 0.15);
  }
  /* entry-loss color is based on P&L value, not mood */
  /* lesson always yellow regardless of mood */
  .entry-lesson {
    font-size: 15px;
    color: #facc15;
    font-weight: bold;
    padding: 8px 12px;
    margin-top: 10px;
    background: #1a1800;
    border-left: 3px solid #facc15;
    border-radius: 0 4px 4px 0;
    line-height: 1.5;
  }
  .entry-tags {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 3px;
    background: #1a0a0a;
    color: #ff6666;
    border: 1px solid #331111;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .tag.tag-good {
    background: #0a1a0a;
    color: #4ade80;
    border-color: #113311;
  }

  .add-section {
    margin-top: 30px;
    border-top: 1px solid #1a1a1a;
    padding-top: 30px;
  }
  .add-btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: #1a0a0a;
    border: 1px dashed #ff4444;
    border-radius: 6px;
    color: #ff4444;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .add-btn:hover {
    background: #220e0e;
    border-style: solid;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    justify-content: center;
    align-items: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #111;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 30px;
    width: 90%;
    max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h2 {
    color: #ff4444;
    font-size: 18px;
    margin-bottom: 20px;
  }
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 12px;
    color: #888;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 10px;
    background: #0a0a0a;
    border: 1px solid #333;
    border-radius: 4px;
    color: #e0e0e0;
    font-family: inherit;
    font-size: 14px;
  }
  .form-group textarea { height: 80px; resize: vertical; }
  .rich-editor {
    width: 100%;
    min-height: 120px;
    max-height: 400px;
    overflow-y: auto;
    padding: 10px;
    background: #0a0a0a;
    border: 1px solid #333;
    border-radius: 4px;
    color: #e0e0e0;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.6;
    outline: none;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .rich-editor:focus { border-color: #ff4444; }
  .rich-editor:empty:before {
    content: attr(data-placeholder);
    color: #555;
    pointer-events: none;
  }
  .rich-editor img {
    max-width: 100%;
    max-height: 300px;
    border-radius: 4px;
    border: 1px solid #333;
    display: block;
    margin: 8px 0;
    cursor: pointer;
  }
  .rich-editor img:hover { border-color: #ff4444; }
  .rich-editor mark, .rich-editor .hl {
    background: rgba(255, 230, 0, 0.35);
    color: #fff;
    padding: 1px 2px;
    border-radius: 2px;
  }
  .rich-editor-toolbar {
    display: flex;
    gap: 4px;
    margin-bottom: 4px;
  }
  .rich-editor-toolbar button {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #e0e0e0;
    padding: 4px 10px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 12px;
  }
  .rich-editor-toolbar button:hover { border-color: #ff4444; }
  .rich-editor-toolbar button.active { background: rgba(255, 230, 0, 0.25); border-color: #ffe600; }
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    outline: none;
    border-color: #ff4444;
  }
  /* make date picker calendar icon bigger and the whole input clickable */
  input[type="date"] {
    cursor: pointer;
    position: relative;
  }
  input[type="date"]::-webkit-calendar-picker-indicator {
    cursor: pointer;
    filter: invert(0.7);
    font-size: 18px;
    padding: 4px;
  }
  /* dark theme for the date picker dropdown */
  ::-webkit-datetime-edit { color: #e0e0e0; }
  ::-webkit-datetime-edit-fields-wrapper { color: #e0e0e0; }
  .tag-selector { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag-option {
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 3px;
    background: #1a1a1a;
    color: #888;
    border: 1px solid #333;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tag-option.bad {
    background: #1a0a0a;
    color: #ff6666;
    border-color: #ff4444;
  }
  .tag-option.good {
    background: #0a1a0a;
    color: #4ade80;
    border-color: #22c55e;
  }
  .tag-option.selected {
    background: #1a0a0a;
    color: #ff6666;
    border-color: #ff4444;
  }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-save {
    flex: 1;
    padding: 12px;
    background: #ff4444;
    border: none;
    border-radius: 4px;
    color: #fff;
    font-family: inherit;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
  }
  .btn-save:hover { background: #ff5555; }
  .btn-cancel {
    padding: 12px 20px;
    background: #222;
    border: 1px solid #333;
    border-radius: 4px;
    color: #888;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
  }
  .btn-cancel:hover { background: #2a2a2a; }

  .entry-action-btn {
    background: none;
    border: 1px solid #333;
    color: #666;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    padding: 5px 14px;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .entry-action-btn:hover {
    color: #ccc;
    border-color: #666;
    background: #1a1a1a;
  }
  .entry-action-del:hover {
    color: #ff4444;
    border-color: #ff4444;
    background: #1a0a0a;
  }

  .quote {
    text-align: center;
    padding: 30px 20px;
    color: #444;
    font-style: italic;
    font-size: 14px;
    line-height: 1.6;
  }
  .quote span {
    display: block;
    margin-top: 8px;
    color: #333;
    font-size: 12px;
    font-style: normal;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #333;
  }
  .empty-state p { font-size: 14px; }

  /* top dashboard: streak + calendar side by side */
  .dashboard-row {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 20px 16px;
    display: flex;
    gap: 32px;
    align-items: flex-start;
  }
  .dashboard-left {
    flex: 3;
    min-width: 0;
  }
  .dashboard-right {
    flex: 2;
    min-width: 0;
  }

  /* streak chart */
  .streak-section {
    padding: 0;
  }
  .streak-header {
    font-size: 16px;
    color: #4ade80;
    font-weight: bold;
    text-align: center;
    letter-spacing: 2px;
  }
  .streak-subtitle {
    font-size: 11px;
    color: #444;
    text-align: center;
    margin-top: 4px;
    margin-bottom: 16px;
  }

  /* calendar */
  .calendar-section {
    background: #111;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 16px;
  }
  .calendar-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .calendar-nav button {
    background: none;
    border: 1px solid #333;
    color: #888;
    font-size: 14px;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .calendar-nav button:hover {
    color: #ccc;
    border-color: #555;
  }
  .calendar-month-label {
    font-size: 14px;
    color: #ccc;
    font-weight: bold;
    letter-spacing: 1px;
  }
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .calendar-dow {
    font-size: 10px;
    color: #555;
    text-align: center;
    padding: 2px 0 6px;
  }
  .calendar-day {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    border-radius: 4px;
    color: #555;
    background: #1a1a1a;
    position: relative;
    gap: 1px;
  }
  .calendar-day.empty {
    background: transparent;
  }
  .calendar-day.clean {
    color: #ccc;
  }
  .cal-count {
    display: block;
    font-size: 9px;
    line-height: 1;
    margin-top: 2px;
  }
  .cal-count.good { color: #4ade80; }
  .cal-count.bad { color: #ff4444; }
  .calendar-day.mistake {
    color: #ccc;
  }
  .calendar-day.today {
    outline: 1px solid #4ade80;
    outline-offset: -1px;
  }
  .calendar-day.future {
    background: #0f0f0f;
    color: #333;
  }
  .calendar-day.weekend {
    opacity: 0.4;
  }
  .calendar-legend {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-top: 10px;
    font-size: 10px;
    color: #666;
  }
  .calendar-legend span {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .calendar-legend .dot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
    display: inline-block;
  }
  .streak-chart {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .streak-show-hidden button:hover {
    color: #aaa;
    border-color: #666;
  }
  .streak-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .streak-label {
    width: 90px;
    font-size: 11px;
    color: #888;
    text-align: right;
    flex-shrink: 0;
  }
  .streak-bar-bg {
    flex: 1;
    height: 22px;
    background: #1a1a1a;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .streak-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s ease;
    min-width: 2px;
  }
  .streak-days {
    width: 65px;
    font-size: 13px;
    font-weight: bold;
    text-align: right;
    flex-shrink: 0;
  }
  .streak-days .unit {
    font-size: 10px;
    font-weight: normal;
    color: #666;
    margin-left: 2px;
  }

  /* focus area - improvement targets */
  .focus-area {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 20px 16px;
  }
  .focus-area-header {
    font-size: 14px;
    color: #ff9800;
    font-weight: bold;
    text-align: center;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .focus-area-subtitle {
    font-size: 11px;
    color: #444;
    text-align: center;
    margin-bottom: 12px;
  }
  .focus-input-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 16px;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
  }
  .focus-reminder-input {
    flex: 1;
    background: #111;
    border: 1px solid #333;
    border-radius: 6px;
    padding: 10px 14px;
    color: #eee;
    font-family: inherit;
    font-size: 14px;
    outline: none;
  }
  .focus-reminder-input:focus {
    border-color: #ff9800;
  }
  .focus-add-btn {
    background: #ff9800;
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 10px 18px;
    font-family: inherit;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    white-space: nowrap;
  }
  .focus-add-btn:hover {
    background: #ffb74d;
  }
  .focus-reminder-cards {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 10px;
  }
  .focus-reminder-card {
    background: rgba(30, 25, 10, 0.6);
    border-left: 3px solid #ff9800;
    border-radius: 6px;
    padding: 12px 36px 12px 16px;
    color: #ffcc00;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.3px;
    cursor: default;
    position: relative;
  }
  .focus-reminder-card .focus-close-btn {
    position: absolute;
    top: 50%;
    right: 8px;
    transform: translateY(-50%);
    width: 22px;
    height: 22px;
    border: none;
    background: transparent;
    color: #555;
    font-size: 13px;
    line-height: 22px;
    text-align: center;
    cursor: pointer;
    padding: 0;
    border-radius: 50%;
    transition: all 0.2s;
  }
  .focus-reminder-card .focus-close-btn:hover {
    color: #ff4444;
    background: rgba(255, 68, 68, 0.15);
  }
  /* Daily tag checklist in modal */
  .dtag-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #1a1a1a;
    cursor: pointer;
    user-select: none;
  }
  .dtag-row:hover { background: #1a1a1a; margin: 0 -12px; padding: 10px 12px; }
  .dtag-name { font-size: 14px; color: #ccc; }
  .dtag-state { font-size: 18px; width: 32px; text-align: center; }
  .dtag-state.good { color: #4ade80; }
  .dtag-state.bad { color: #ff4444; }
  .dtag-state.empty { color: #333; }
  .focus-30-grid {
    display: grid;
    grid-template-columns: repeat(30, 1fr);
    gap: 2px;
  }
  .focus-30-day {
    aspect-ratio: 1;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    transition: all 0.15s;
  }
  .focus-30-day.clean {
    background: #1a3a1a;
    color: #4ade80;
  }
  .focus-30-day.clean::after {
    content: '✓';
    font-size: 10px;
  }
  .focus-30-day.dirty {
    background: #3a1a1a;
    color: #ff4444;
  }
  .focus-30-day.dirty::after {
    content: '✗';
    font-size: 10px;
  }
  .focus-30-day.future {
    background: #0f0f0f;
    color: #222;
  }
  .focus-30-day.today {
    outline: 1px solid #ff9800;
    outline-offset: -1px;
  }
  .focus-30-day.no-data {
    background: #1a1a1a;
    color: #333;
  }
  .focus-30-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 3px;
    font-size: 9px;
    color: #333;
  }
  .focus-empty-msg {
    color: #444;
    font-size: 12px;
    text-align: center;
    padding: 8px;
  }
  @media (max-width: 768px) {
    .focus-30-grid {
      grid-template-columns: repeat(15, 1fr);
    }
  }

  /* screenshots */
  .paste-zone {
    border: 1px dashed #444;
    border-radius: 4px;
    padding: 16px;
    text-align: center;
    color: #555;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    min-height: 60px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    justify-content: center;
  }
  .paste-zone:hover, .paste-zone.dragover {
    border-color: #ff4444;
    background: #1a0a0a;
    color: #ff6666;
  }
  .paste-zone .hint {
    width: 100%;
    pointer-events: none;
  }
  .paste-zone .thumb {
    position: relative;
    display: inline-block;
  }
  .paste-zone .thumb img {
    height: 80px;
    border-radius: 4px;
    border: 1px solid #333;
  }
  .paste-zone .thumb-remove {
    position: absolute;
    top: -6px;
    right: -6px;
    width: 18px;
    height: 18px;
    background: #ff4444;
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 11px;
    cursor: pointer;
    line-height: 18px;
    text-align: center;
    padding: 0;
  }
  .entry-screenshots {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .entry-screenshots img {
    height: 120px;
    border-radius: 4px;
    border: 1px solid #222;
    cursor: pointer;
    transition: all 0.2s;
  }
  .entry-screenshots img:hover {
    border-color: #ff4444;
    transform: scale(1.02);
  }
  .entry-screenshots-small img {
    height: 160px;
  }
  /* lightbox for single image */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);

var pendingScreenshots = []; // base64 data URLs for new P&L screenshots (paste zone)

var existingDetailScreenshots = []; // Drive URLs of already-saved detail screenshots

const TAGS = [
  '沒設停損', '凹單', '報復交易', '過度交易',
  '逆勢做單', '衝動進場', '重倉', '移動停損',

  '多空都做', '沒遵守日風控', '看對做錯', '沒耐心等待', '盯盤'
];

const QUOTES = [
  { text: '市場不會因為你需要錢就給你錢。', author: '— 交易真相' },
  { text: '虧損不可恥，重複同樣的虧損才可恥。', author: '— 自我提醒' },
  { text: 'The goal of a successful trader is to make the best trades. Money is secondary.', author: '— Alexander Elder' },

  { text: "It's not whether you're right or wrong, but how much money you make when you're right and how much you lose when you're wrong.", author: '— George Soros' },
  { text: '你不需要每天都做單，但每天都需要紀律。', author: '— 交易心態' },
  { text: '最貴的學費是你不從中學習的那一次。', author: '— 自我提醒' },
  { text: 'Losing is part of winning. The key is managing your losses.', author: '— 交易真相' },
];

// ── Notion API via RayOS proxy ──
var NOTION_DB_ID = '7e8a015f59984504aba62b86379f83cf';
var DISCIPLINE_DB_ID = 'b94d18624e184f1f8396b086d00adb72';
var disciplineIndex = {}; // dateStr → notion page id
var entries = [];
var editingId = null;
var loading = false;

function getNotionToken() {
  return localStorage.getItem('notion_token') || '';
}


function notionRequest(method, path, body) {
  var token = getNotionToken();
  if (!token) return Promise.reject(new Error('Notion token not configured'));
  return fetch('/api/notion', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path: path, method: method, body: body, token: token })
  }).then(function(r) {
    return r.json().then(function(data) {
      if (data.object === 'error') throw new Error(data.message || 'Notion API error');
      return data;
    });
  });
}

function parseNotionPage(page) {
  var props = page.properties;
  var dateProp = props['日期'] && props['日期'].date;
  var dateVal = dateProp ? dateProp.start : '';
  var lossVal = (props['虧損金額'] && props['虧損金額'].number) || 0;
  var titleArr = (props['名稱'] && props['名稱'].title) || [];
  var getRichText = function(name) {
    var rt = (props[name] && props[name].rich_text) || [];
    return rt.length ? rt[0].plain_text : '';
  };
  var tags = ((props['錯誤類型'] && props['錯誤類型'].multi_select) || []).map(function(o) { return o.name; });
  var goodTags = ((props['做得好'] && props['做得好'].multi_select) || []).map(function(o) { return o.name; });

  // parse screenshot URLs from "截圖" property (JSON)
  var ssData = { pnl: [], detail: [] };
  var ssRaw = getRichText('截圖');
  if (ssRaw) {
    try { ssData = JSON.parse(ssRaw); } catch(e) {}
  }

  var linkProp = props['連結'] && props['連結'].url;
  return {
    id: page.id,
    name: titleArr.length ? titleArr[0].plain_text : '',
    date: dateVal,
    loss: lossVal,
    mistake: getRichText('錯誤描述'),
    detail: getRichText('詳細過程'),
    account: getRichText('帳號'),
    link: linkProp || '',
    lesson: getRichText('這天犯的錯'),
    mood: getRichText('mood') || 'bad',
    tags: tags,
    goodTags: goodTags,
    pnlScreenshots: ssData.pnl || [],
    detailScreenshots: ssData.detail || []
  };
}

// ── Compress image to JPEG before upload (stay under Vercel 4.5MB limit) ──
function compressImage(dataUrl, maxWidth, quality) {
  maxWidth = maxWidth || 1600;
  quality = quality || 0.8;
  return new Promise(function(resolve) {
    var img = new Image();
    img.onload = function() {
      var w = img.width, h = img.height;
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = dataUrl;
  });
}

// ── Google Drive screenshot upload via Vercel API ──
function uploadScreenshotToDrive(base64DataUrl) {
  // compress first to avoid Vercel body size limit
  return compressImage(base64DataUrl).then(function(compressed) {
    var parts = compressed.split(',');
    var base64 = parts[1] || '';
    var filename = 'shame-' + Date.now() + '.jpg';

    return fetch('/api/drive-upload', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: base64, filename: filename, mimeType: 'image/jpeg' })
    });
  }).then(function(r) {
    if (!r.ok) {
      return r.text().then(function(t) {
        try { var j = JSON.parse(t); throw new Error(j.error || 'Upload failed'); }
        catch(e) { if (e.message !== 'Upload failed') throw e; throw new Error('Upload failed: ' + t.substring(0, 200)); }
      });
    }
    return r.json();
  }).then(function(data) {
    if (data.url) return data.url;
    throw new Error(data.error || 'Upload failed');
  });
}

// screenshots are now URLs (Google Drive), not filenames
function getScreenshotUrl(urlOrFilename) {
  return urlOrFilename || '';
}

// ── Setup banner ──

// ── Ensure Notion DB has "截圖" property ──
var dbSchemaChecked = false;
function ensureNotionSchema() {
  if (dbSchemaChecked) return Promise.resolve();
  return notionRequest('PATCH', '/databases/' + NOTION_DB_ID, {
    properties: {
      '截圖': { rich_text: {} },
      '連結': { url: {} }
    }
  }).then(function() {
    dbSchemaChecked = true;
  }).catch(function() {
    dbSchemaChecked = true; // don't retry on error
  });
}

function formatDate(dateStr) {
  var d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
}

// render text with [hl]...[/hl] as <mark> elements
function renderHighlightedText(text, container) {
  var re = /\[hl\]([\s\S]*?)\[\/hl\]/g;
  var lastIdx = 0;
  var match;
  while ((match = re.exec(text)) !== null) {
    if (match.index > lastIdx) {
      container.appendChild(document.createTextNode(text.substring(lastIdx, match.index)));
    }
    var mark = document.createElement('mark');
    mark.textContent = match[1];
    container.appendChild(mark);
    lastIdx = re.lastIndex;
  }
  if (lastIdx < text.length) {
    container.appendChild(document.createTextNode(text.substring(lastIdx)));
  }
}

function setLoading(state) {
  loading = state;
  document.getElementById('addBtn').disabled = state;
  document.getElementById('addBtn').textContent = state ? '載入中...' : '+ 記錄一筆新的恥辱';
}

function loadEntries() {
  setLoading(true);
  var token = getNotionToken();
  if (!token) {
    var el = document.getElementById('entriesList');
    el.textContent = '';
    var msg = document.createElement('div');
    msg.className = 'empty-state';
    var p = document.createElement('p');
    p.textContent = 'Notion Token 未設定 — 請到 RayOS Settings 設定後重新整理';
    msg.appendChild(p);
    el.appendChild(msg);
    setLoading(false);
    return Promise.resolve();
  }
  return ensureNotionSchema().then(function() {
    return notionRequest('POST', '/databases/' + NOTION_DB_ID + '/query', {
      sorts: [{ property: '日期', direction: 'descending' }]
    });
  }).then(function(result) {
    if (result.error) {
      console.error('Notion error:', result.error);
      setLoading(false);
      return;
    }
    entries = (result.results || []).map(parseNotionPage);
    setLoading(false);
    render();
  }).catch(function(err) {
    console.error('Failed to load:', err);
    setLoading(false);
  });
}

function updateStats() {
  const totalLoss = entries.reduce(function(s, e) { return s + Number(e.loss); }, 0);
  // Find worst single loss (largest absolute value)
  const worstLoss = entries.length ? Math.max.apply(null, entries.map(function(e) { return Math.abs(Number(e.loss)); })) : 0;

  var absTotal = Math.abs(totalLoss);
  document.getElementById('totalLoss').textContent = '-$' + absTotal.toLocaleString();
  document.getElementById('totalEntries').textContent = entries.length;
  document.getElementById('worstLoss').textContent = '-$' + worstLoss.toLocaleString();

  // count mistakes from entries + daily tag checklist
  const tagCount = {};
  entries.forEach(function(e) {
    (e.tags || []).forEach(function(t) { tagCount[t] = (tagCount[t] || 0) + 1; });
  });
  var dailyData = getDailyTagData();
  Object.keys(dailyData).forEach(function(dateStr) {
    var dayData = dailyData[dateStr];
    Object.keys(dayData).forEach(function(tag) {
      if (dayData[tag] === 'bad') tagCount[tag] = (tagCount[tag] || 0) + 1;
    });
  });
  const sorted = Object.keys(tagCount).sort(function(a, b) { return tagCount[b] - tagCount[a]; });
  document.getElementById('topMistake').textContent = sorted.length ? sorted[0] : '—';
}


function countWeekdays(from, to) {
  var count = 0;
  var d = new Date(from);
  d.setDate(d.getDate() + 1);
  while (d <= to) {
    var dow = d.getDay();
    if (dow !== 0 && dow !== 6) count++;
    d.setDate(d.getDate() + 1);
  }
  return count;
}

function renderStreakChart() {
  var chart = document.getElementById('streakChart');
  chart.textContent = '';

  var today = new Date();
  today.setHours(0, 0, 0, 0);

  // Build per-date, per-tag status map (merge dailyData + entries)
  var dailyData = getDailyTagData();
  var tagStatusMap = {}; // { 'YYYY-MM-DD': { tag: 'good'|'bad' } }
  var tagHasData = {};
  TAGS.forEach(function(t) { tagHasData[t] = false; });

  // From daily tag data (calendar tri-state)
  Object.keys(dailyData).forEach(function(dateStr) {
    if (!tagStatusMap[dateStr]) tagStatusMap[dateStr] = {};
    var dayData = dailyData[dateStr];
    Object.keys(dayData).forEach(function(tag) {
      if (TAGS.indexOf(tag) !== -1) {
        tagHasData[tag] = true;
        tagStatusMap[dateStr][tag] = dayData[tag];
      }
    });
  });
  // From shame entries (tags = bad, goodTags = good)
  entries.forEach(function(e) {
    var dateStr = e.date;
    if (!tagStatusMap[dateStr]) tagStatusMap[dateStr] = {};
    (e.tags || []).forEach(function(t) {
      if (TAGS.indexOf(t) !== -1) {
        tagHasData[t] = true;
        tagStatusMap[dateStr][t] = 'bad';
      }
    });
    (e.goodTags || []).forEach(function(t) {
      if (TAGS.indexOf(t) !== -1) {
        tagHasData[t] = true;
        if (tagStatusMap[dateStr][t] !== 'bad') {
          tagStatusMap[dateStr][t] = 'good';
        }
      }
    });
  });

  // Count consecutive ✓ (good) days going backwards from today
  // Days without mark or with ✗ break the streak (weekends skipped)
  var streaks = [];
  TAGS.forEach(function(t) {
    if (!tagHasData[t]) {
      streaks.push({ tag: t, days: 0, status: 'nodata' });
      return;
    }
    var streak = 0;
    var d = new Date(today);
    d.setDate(d.getDate() - 1); // exclude today, start from yesterday
    for (var i = 0; i < 365; i++) {
      var dow = d.getDay();
      if (dow === 0 || dow === 6) { d.setDate(d.getDate() - 1); continue; }
      var ds = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
      var dayStatus = tagStatusMap[ds] && tagStatusMap[ds][t];
      if (dayStatus === 'good') {
        streak++;
      } else {
        break;
      }
      d.setDate(d.getDate() - 1);
    }
    streaks.push({ tag: t, days: streak, status: streak > 0 ? 'streak' : 'zero' });
  });

  // sort: streak days desc, zero/nodata last
  streaks.sort(function(a, b) {
    if (a.days !== b.days) return b.days - a.days;
    return 0;
  });

  var maxDays = 1;
  streaks.forEach(function(s) { if (s.days > maxDays) maxDays = s.days; });

  streaks.forEach(function(s) {
    var row = document.createElement('div');
    row.className = 'streak-row';

    var label = document.createElement('div');
    label.className = 'streak-label';
    label.textContent = s.tag;
    row.appendChild(label);

    var barBg = document.createElement('div');
    barBg.className = 'streak-bar-bg';
    var barFill = document.createElement('div');
    barFill.className = 'streak-bar-fill';
    if (s.status === 'streak') {
      barFill.style.width = (s.days / maxDays * 100) + '%';
      barFill.style.background = 'linear-gradient(90deg, #22c55e, #4ade80)';
    } else {
      barFill.style.width = '0%';
    }
    barBg.appendChild(barFill);
    row.appendChild(barBg);

    var daysEl = document.createElement('div');
    daysEl.className = 'streak-days';
    if (s.status === 'streak') {
      daysEl.style.color = '#4ade80';
      daysEl.textContent = s.days + ' 天';
    } else if (s.status === 'nodata') {
      daysEl.style.color = '#555';
      daysEl.textContent = '無資料';
    } else {
      daysEl.style.color = '#555';
      daysEl.textContent = '0 天';
    }
    row.appendChild(daysEl);

    chart.appendChild(row);
  });
}

// ── Focus Area (盤前提醒) ──
function getReminders() {

  if (saved) return JSON.parse(saved);

}

function saveReminders(list) {

}

  var input = document.getElementById('focusReminderInput');

// ── Daily Tag Checklist (per-date, 3-state: null/good/bad) ──
// localStorage cache: { "2026-03-25": { "凹單": "bad", "FOMO": "good" }, ... }
// Notion DB: one page per date, 紀律資料 = JSON string of tag states
function getDailyTagData() {
  return JSON.parse(localStorage.getItem('shamewall_daily_tags') || '{}');
}
function saveDailyTagData(data) {
  localStorage.setItem('shamewall_daily_tags', JSON.stringify(data));
}

// Sync a single date to Notion (upsert)
function syncDayToNotion(dateStr) {
  var token = getNotionToken();
  if (!token) return;
  var data = getDailyTagData();
  var dayData = data[dateStr] || {};
  var jsonStr = JSON.stringify(dayData);
  var pageId = disciplineIndex[dateStr];

  if (pageId) {
    // update existing page
    notionRequest('PATCH', '/pages/' + pageId, {
      properties: {
        '紀律資料': { rich_text: [{ text: { content: jsonStr } }] }
      }
    }).catch(function(e) { console.error('Discipline sync error:', e); });
  } else {
    // create new page
    notionRequest('POST', '/pages', {
      parent: { database_id: DISCIPLINE_DB_ID },
      properties: {
        '日期': { title: [{ text: { content: dateStr } }] },
        '紀律資料': { rich_text: [{ text: { content: jsonStr } }] }
      }
    }).then(function(result) {
      if (result && result.id) disciplineIndex[dateStr] = result.id;
    }).catch(function(e) { console.error('Discipline create error:', e); });
  }
}

// Load all discipline data from Notion → localStorage
function loadDisciplineFromNotion() {
  var token = getNotionToken();
  if (!token) return Promise.resolve();
  return notionRequest('POST', '/databases/' + DISCIPLINE_DB_ID + '/query', {
    sorts: [{ property: '日期', direction: 'descending' }]
  }).then(function(result) {
    var data = {};
    (result.results || []).forEach(function(page) {
      var props = page.properties;
      var titleArr = (props['日期'] && props['日期'].title) || [];
      var dateStr = titleArr.length ? titleArr[0].plain_text : '';
      var rtArr = (props['紀律資料'] && props['紀律資料'].rich_text) || [];
      var jsonStr = rtArr.length ? rtArr[0].plain_text : '{}';
      if (dateStr) {
        try { data[dateStr] = JSON.parse(jsonStr); } catch(e) { data[dateStr] = {}; }
        disciplineIndex[dateStr] = page.id;
      }
    });
    // merge: Notion is source of truth, overwrite localStorage
    saveDailyTagData(data);
    console.log('[ShameWall] Loaded ' + Object.keys(data).length + ' discipline days from Notion');
  }).catch(function(e) { console.error('Discipline load error:', e); });
}

function openDailyTagModal(dateStr) {
  var modal = document.getElementById('dailyTagModal');
  var title = document.getElementById('dailyTagTitle');
  var list = document.getElementById('dailyTagList');
  title.textContent = dateStr + ' 交易紀律';
  list.textContent = '';

  // merge daily checklist + entry card tags for this date
  var allData = getDailyTagData();
  var dayData = {};
  var saved = allData[dateStr] || {};
  Object.keys(saved).forEach(function(k) { dayData[k] = saved[k]; });
  entries.forEach(function(e) {
    if (e.date === dateStr && e.tags) {
      e.tags.forEach(function(t) { if (!dayData[t]) dayData[t] = 'bad'; });
    }
  });

  TAGS.forEach(function(tag) {
    var row = document.createElement('div');
    row.className = 'dtag-row';

    var name = document.createElement('span');
    name.className = 'dtag-name';
    name.textContent = tag;

    var state = document.createElement('span');
    state.className = 'dtag-state';
    var current = dayData[tag] || null;
    updateStateIcon(state, current);

    row.appendChild(name);
    row.appendChild(state);

    // click cycles: null → good → bad → null
    (function(t, stateEl) {
      row.addEventListener('click', function() {
        var data = getDailyTagData();
        if (!data[dateStr]) data[dateStr] = {};
        var cur = data[dateStr][t] || null;
        var next;
        if (cur === null) next = 'good';
        else if (cur === 'good') next = 'bad';
        else next = null;

        if (next === null) {
          delete data[dateStr][t];
        } else {
          data[dateStr][t] = next;
        }
        if (data[dateStr] && Object.keys(data[dateStr]).length === 0) delete data[dateStr];
        saveDailyTagData(data);
        syncDayToNotion(dateStr);
        updateStateIcon(stateEl, next);
        renderStreakChart();
        renderCalendar();

        // bidirectional sync: update entry cards for this date
        syncTagToEntries(dateStr, t, next);
      });
    })(tag, state);

    list.appendChild(row);
  });

  modal.classList.add('active');
}

function updateStateIcon(el, state) {
  el.textContent = state === 'good' ? '✓' : state === 'bad' ? '✗' : '—';
  el.className = 'dtag-state ' + (state === 'good' ? 'good' : state === 'bad' ? 'bad' : 'empty');
}

function closeDailyTagModal() {
  document.getElementById('dailyTagModal').classList.remove('active');
}

// Sync a tag change from daily modal to matching entry cards in Notion
function syncTagToEntries(dateStr, tag, newState) {
  var matchingEntries = entries.filter(function(e) { return e.date === dateStr && e.id; });
  if (matchingEntries.length === 0) return;

  matchingEntries.forEach(function(entry) {
    var badTags = (entry.tags || []).slice();
    var goodTags = (entry.goodTags || []).slice();

    // remove tag from both lists first
    badTags = badTags.filter(function(t) { return t !== tag; });
    goodTags = goodTags.filter(function(t) { return t !== tag; });

    // add to correct list based on new state
    if (newState === 'bad') badTags.push(tag);
    else if (newState === 'good') goodTags.push(tag);

    // update local entry object
    entry.tags = badTags;
    entry.goodTags = goodTags;

    // update Notion
    var token = getNotionToken();
    if (!token) return;
    notionRequest('PATCH', '/pages/' + entry.id, {
      properties: {
        '錯誤類型': { multi_select: badTags.map(function(t) { return { name: t }; }) },
        '做得好': { multi_select: goodTags.map(function(t) { return { name: t }; }) }
      }
    }).then(function() {
      render();
    }).catch(function(e) {
      console.error('Entry tag sync error:', e);
    });
  });
}

// Get bad count and total count for a date
function dateBadCount(dateStr) {
  // merge daily tag checklist + entry tags for this date
  var merged = {};
  var data = getDailyTagData();
  var dayData = data[dateStr];
  if (dayData) {
    Object.keys(dayData).forEach(function(t) { merged[t] = dayData[t]; });
  }
  // also count entry tags (bad only, don't overwrite existing checklist data)
  entries.forEach(function(e) {
    if (e.date === dateStr && e.tags) {
      e.tags.forEach(function(t) {
        if (!merged[t]) merged[t] = 'bad';
      });
    }
  });
  var vals = Object.values(merged);
  var bad = vals.filter(function(v) { return v === 'bad'; }).length;
  return { bad: bad, total: vals.length };
}

function dateHasMistake(dateStr) {
  return dateBadCount(dateStr).bad > 0;
}

function dateHasData(dateStr) {
  return dateBadCount(dateStr).total > 0;
}

// ── Calendar ──
var calYear = 2026;
var calMonth = 2; // March (0-indexed)

function renderCalendar() {
  var grid = document.getElementById('calGrid');
  var label = document.getElementById('calMonthLabel');
  if (!grid) return;
  grid.textContent = '';

  var monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  label.textContent = calYear + ' 年 ' + monthNames[calMonth];

  // day-of-week headers (Mon-Sun)
  var dows = ['一','二','三','四','五','六','日'];
  dows.forEach(function(d) {
    var el = document.createElement('div');
    el.className = 'calendar-dow';
    el.textContent = d;
    grid.appendChild(el);
  });

  // build set of dates with mistakes
  var mistakeDates = {};
  entries.forEach(function(e) {
    if (e.date) mistakeDates[e.date] = true;
  });

  var today = new Date();
  today.setHours(0, 0, 0, 0);

  var firstDay = new Date(calYear, calMonth, 1);
  var lastDay = new Date(calYear, calMonth + 1, 0);
  // getDay(): 0=Sun. We want Mon=0, so adjust
  var startDow = (firstDay.getDay() + 6) % 7;

  // empty cells before first day
  for (var i = 0; i < startDow; i++) {
    var empty = document.createElement('div');
    empty.className = 'calendar-day empty';
    grid.appendChild(empty);
  }

  // tracking starts from 2026-03-14
  var trackStart = new Date(2026, 2, 14);
  trackStart.setHours(0, 0, 0, 0);

  for (var d = 1; d <= lastDay.getDate(); d++) {
    var cell = document.createElement('div');
    cell.className = 'calendar-day';

    var cellDate = new Date(calYear, calMonth, d);
    var dow = cellDate.getDay();
    var dateStr = calYear + '-' + String(calMonth + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');

    var isWeekend = (dow === 0 || dow === 6);
    var isFuture = cellDate > today;
    var isToday = cellDate.getTime() === today.getTime();
    var isBeforeTracking = cellDate < trackStart;

    if (isWeekend || isFuture || isBeforeTracking) {
      cell.textContent = d;
      if (isWeekend) cell.classList.add('weekend');
      else if (isFuture) cell.classList.add('future');
      // before tracking: just neutral, check if has mistake entry
      if (isBeforeTracking && !isWeekend && mistakeDates[dateStr]) {
        cell.textContent = '';
        cell.classList.add('mistake');
        cell.innerHTML = d + ' <span class="cal-icon">✗</span>';
      }
    } else {
      // show (bad/total) from daily checklist + entry tags
      var counts = dateBadCount(dateStr);
      if (counts.total > 0) {
        cell.classList.add(counts.bad > 0 ? 'mistake' : 'clean');
        cell.innerHTML = d + '<span class="cal-count ' + (counts.bad > 0 ? 'bad' : 'good') + '">(' + counts.bad + '/' + TAGS.length + ')</span>';
      } else {
        cell.textContent = d;
      }
      // click opens daily tag checklist modal
      cell.style.cursor = 'pointer';
      cell.setAttribute('data-date', dateStr);
      cell.addEventListener('click', function() {
        openDailyTagModal(this.getAttribute('data-date'));
      });
    }

    if (isToday) cell.classList.add('today');

    grid.appendChild(cell);
  }
}

document.getElementById('calPrev').addEventListener('click', function() {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
});
document.getElementById('calNext').addEventListener('click', function() {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
});

function renderEntry(e) {
  const card = document.createElement('div');
  card.className = 'entry' + (e.mood === 'good' ? ' entry-good' : '');
  card.dataset.id = e.id;

  // make card clickable
  card.style.cursor = 'pointer';
  card.addEventListener('click', function(ev) {
    // don't open if clicking buttons
    if (ev.target.closest('.entry-action-btn')) return;
    openDetailModal(e.id);
  });

  // header
  const header = document.createElement('div');
  header.className = 'entry-header';
  const dateEl = document.createElement('div');
  dateEl.className = 'entry-date';
  dateEl.textContent = formatDate(e.date) + (e.account ? ' \u00b7 ' + e.account : '');
  const lossEl = document.createElement('div');
  var lossVal = Number(e.loss) || 0;
  lossEl.className = 'entry-loss' + (lossVal > 0 ? ' loss-positive' : '');
  lossEl.textContent = (lossVal >= 0 ? '+$' : '-$') + Math.abs(lossVal).toLocaleString();
  header.appendChild(dateEl);
  header.appendChild(lossEl);
  card.appendChild(header);

  // title (big heading)
  if (e.mistake) {
    var titleEl = document.createElement('div');
    titleEl.className = 'entry-title';
    titleEl.textContent = e.mistake;
    card.appendChild(titleEl);
  }

  // tags (after title, before lesson) — only show ✗ bad tags on cards
  if (e.tags && e.tags.length) {
    const tagsEl = document.createElement('div');
    tagsEl.className = 'entry-tags';
    (e.tags || []).forEach(function(t) {
      const tagEl = document.createElement('span');
      tagEl.className = 'tag';
      tagEl.textContent = '✗ ' + t;
      tagsEl.appendChild(tagEl);
    });
    card.appendChild(tagsEl);
  }

  // lesson (prominent, after tags)
  if (e.lesson) {
    var lessonEl = document.createElement('div');
    lessonEl.className = 'entry-lesson';
    lessonEl.textContent = '⚠ ' + e.lesson;
    card.appendChild(lessonEl);
  }

  // detail text — first paragraph only, click to see full
  if (e.detail) {
    var detailEl = document.createElement('div');
    detailEl.className = 'entry-detail';
    var plainDetail = e.detail.replace(/\[screenshot\]/g, '').trim();
    if (plainDetail) {
      var firstPara = plainDetail.split('\n')[0].trim();
      var displayText = firstPara.length > 80 ? firstPara.substring(0, 80) + '...' : firstPara;
      renderHighlightedText(displayText, detailEl);
    }
    card.appendChild(detailEl);
  }

  // P&L screenshots on card
  var pnlSS = (e.pnlScreenshots || []);
  if (pnlSS.length > 0) {
    var ssEl = document.createElement('div');
    ssEl.className = 'entry-screenshots';
    pnlSS.forEach(function(url) {
      var img = document.createElement('img');
      img.src = url;
      img.loading = 'lazy';
      img.addEventListener('click', function(ev) { ev.stopPropagation(); openLightbox(url); });
      ssEl.appendChild(img);
    });
    card.appendChild(ssEl);
  }

  // action buttons at bottom-right
  var actions = document.createElement('div');
  actions.style.cssText = 'display:flex;justify-content:flex-end;gap:8px;margin-top:auto;padding-top:14px;';

  var editBtn = document.createElement('button');
  editBtn.className = 'entry-action-btn';
  editBtn.textContent = '編輯';
  editBtn.addEventListener('click', function() { openModal(e.id); });
  actions.appendChild(editBtn);

  var delBtn = document.createElement('button');
  delBtn.className = 'entry-action-btn entry-action-del';
  delBtn.textContent = '刪除';
  delBtn.addEventListener('click', function() { deleteEntry(e.id); });
  actions.appendChild(delBtn);

  card.appendChild(actions);

  return card;
}

function openDetailModal(entryId) {
  var e = entries.find(function(x) { return x.id === entryId; });
  if (!e) return;

  var overlay = document.getElementById('detailModal');
  overlay.textContent = '';

  var modal = document.createElement('div');
  modal.className = 'detail-modal';

  // date
  var dateEl = document.createElement('div');
  dateEl.className = 'dm-date';
  dateEl.textContent = formatDate(e.date) + (e.account ? ' \u00b7 ' + e.account : '');
  modal.appendChild(dateEl);

  // tags first — only show ✗ bad tags
  if (e.tags && e.tags.length) {
    var tagsEl = document.createElement('div');
    tagsEl.className = 'dm-tags';
    (e.tags || []).forEach(function(t) {
      var tagEl = document.createElement('span');
      tagEl.className = 'tag';
      tagEl.textContent = '✗ ' + t;
      tagsEl.appendChild(tagEl);
    });
    modal.appendChild(tagsEl);
  }

  // title
  if (e.mistake) {
    var title = document.createElement('div');
    title.className = 'dm-title';
    title.textContent = e.mistake;
    modal.appendChild(title);
  }

  // link
  if (e.link) {
    var linkWrap = document.createElement('div');
    linkWrap.style.cssText = 'margin:8px 0 12px;';
    var linkEl = document.createElement('a');
    linkEl.href = e.link;
    linkEl.target = '_blank';
    linkEl.rel = 'noopener noreferrer';
    linkEl.textContent = e.link;
    linkEl.style.cssText = 'color:#d4c5a9;font-size:13px;word-break:break-all;text-decoration:underline;';
    linkEl.addEventListener('click', function(ev) { ev.stopPropagation(); });
    linkWrap.appendChild(linkEl);
    modal.appendChild(linkWrap);
  }

  // detail text with inline detail screenshots (NOT P&L screenshots)
  var detailSS = (e.detailScreenshots || []).slice();
  var ssIndex = 0;

  if (e.detail) {
    var detailEl = document.createElement('div');
    detailEl.className = 'dm-detail';

    var parts = e.detail.split('[screenshot]');

    parts.forEach(function(part, i) {
      if (part.trim()) {

      }
      if (i < parts.length - 1 && ssIndex < detailSS.length) {
        var img = document.createElement('img');
        img.src = getScreenshotUrl(detailSS[ssIndex]);
        img.addEventListener('click', function(ev) {
          ev.stopPropagation();
          openLightbox(img.src);
        });
        detailEl.appendChild(img);
        ssIndex++;
      }
    });

    modal.appendChild(detailEl);
  }

  // P&L screenshots at the very bottom
  var pnlSS = (e.pnlScreenshots || []);
  if (pnlSS.length) {
    var pnlLabel = document.createElement('div');
    pnlLabel.style.cssText = 'color:#555;font-size:12px;margin-top:24px;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;';
    pnlLabel.textContent = '損益截圖';
    modal.appendChild(pnlLabel);
    var pnlEl = document.createElement('div');
    pnlEl.className = 'dm-screenshots';
    pnlSS.forEach(function(filename) {
      var img = document.createElement('img');
      img.src = getScreenshotUrl(filename);
      img.addEventListener('click', function(ev) {
        ev.stopPropagation();
        openLightbox(img.src);
      });
      pnlEl.appendChild(img);
    });
    modal.appendChild(pnlEl);
  }

  // action buttons
  var actions = document.createElement('div');
  actions.className = 'dm-actions';
  var editBtn = document.createElement('button');
  editBtn.className = 'entry-action-btn';
  editBtn.textContent = '編輯';
  editBtn.addEventListener('click', function(ev) {
    ev.stopPropagation();
    overlay.classList.remove('active');
    openModal(e.id);
  });
  actions.appendChild(editBtn);
  var delBtn = document.createElement('button');
  delBtn.className = 'entry-action-btn entry-action-del';
  delBtn.textContent = '刪除';
  delBtn.addEventListener('click', function(ev) {
    ev.stopPropagation();
    overlay.classList.remove('active');
    deleteEntry(e.id);
  });
  actions.appendChild(delBtn);
  modal.appendChild(actions);

  overlay.appendChild(modal);
  overlay.classList.add('active');
}

    p2.style.marginTop = '8px';
    p2.style.color = '#555';
    p2.style.fontSize = '12px';
    empty.appendChild(p1);
    empty.appendChild(p2);
    list.appendChild(empty);
    updateStats();
    return;
  }

  var sorted = entries.slice().sort(function(a, b) { return new Date(b.date) - new Date(a.date); });
  sorted.forEach(function(e) {
    list.appendChild(renderEntry(e));
  });
  updateStats();
  renderStreakChart();
  renderFocusArea();
  renderCalendar();
}

function openModal(id) {
  editingId = id || null;
  var modal = document.getElementById('modal');
  var tagSelector = document.getElementById('tagSelector');
  tagSelector.textContent = '';

  TAGS.forEach(function(t) {
    var el = document.createElement('div');
    el.className = 'tag-option';
    el.dataset.tag = t;
    el.dataset.state = 'none'; // none → bad → good → none
    el.textContent = t;
    el.addEventListener('click', function() {
      var s = el.dataset.state;
      if (s === 'none') {
        el.dataset.state = 'bad';
        el.className = 'tag-option bad';
        el.textContent = '✗ ' + t;
      } else if (s === 'bad') {
        el.dataset.state = 'good';
        el.className = 'tag-option good';
        el.textContent = '✓ ' + t;
      } else {
        el.dataset.state = 'none';
        el.className = 'tag-option';
        el.textContent = t;
      }
    });
    tagSelector.appendChild(el);
  });

  if (editingId) {
    var e = entries.find(function(x) { return x.id === editingId; });
    document.getElementById('modalTitle').textContent = '編輯記錄';
    setMoodUI(e.mood === 'good' ? 'good' : 'bad');
    document.getElementById('entryDate').value = e.date;
    document.getElementById('entryLoss').value = e.loss;
    document.getElementById('entryMistake').value = e.mistake || '';
    document.getElementById('entryLesson').value = e.lesson || '';
    document.getElementById('entryLink').value = e.link || '';
    document.getElementById('entryAccount').value = e.account || '';
    (e.tags || []).forEach(function(t) {
      var tagEl = tagSelector.querySelector('[data-tag="' + t + '"]');
      if (tagEl) {
        tagEl.dataset.state = 'bad';
        tagEl.className = 'tag-option bad';
        tagEl.textContent = '✗ ' + t;
      }
    });
    (e.goodTags || []).forEach(function(t) {
      var tagEl = tagSelector.querySelector('[data-tag="' + t + '"]');
      if (tagEl) {
        tagEl.dataset.state = 'good';
        tagEl.className = 'tag-option good';
        tagEl.textContent = '✓ ' + t;
      }
    });
    // reconstruct rich editor with inline detail screenshots
    var editorEl = document.getElementById('entryDetail');
    editorEl.innerHTML = '';
    var detailSS = (e.detailScreenshots || []).slice();
    var dsIdx = 0;
    if (e.detail) {
      var parts = e.detail.split('[screenshot]');
      parts.forEach(function(part, i) {
        if (part) {
          // use innerHTML-safe text with <br> for newlines, render [hl] as <mark>
          var lines = part.split('\n');
          lines.forEach(function(line, li) {
            if (line) renderHighlightedText(line, editorEl);
            if (li < lines.length - 1) editorEl.appendChild(document.createElement('br'));
          });
        }
        if (i < parts.length - 1 && dsIdx < detailSS.length) {
          var img = document.createElement('img');
          img.src = getScreenshotUrl(detailSS[dsIdx]);
          editorEl.appendChild(img);
          dsIdx++;
        }
      });
    }
    existingPnlScreenshots = (e.pnlScreenshots || []).slice();
    existingDetailScreenshots = (e.detailScreenshots || []).slice();
  } else {
    existingPnlScreenshots = [];
    existingDetailScreenshots = [];
    document.getElementById('modalTitle').textContent = '記錄你的失敗';
    setMoodUI('bad');
    document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('entryLoss').value = '';
    document.getElementById('entryMistake').value = '';
    document.getElementById('entryLesson').value = '';
    document.getElementById('entryDetail').textContent = '';
    document.getElementById('entryLink').value = '';
    document.getElementById('entryAccount').value = '';
  }

  // reset screenshots
  pendingScreenshots = [];
  renderPasteZone();

  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  editingId = null;
  pendingScreenshots = [];
  existingPnlScreenshots = [];
  existingDetailScreenshots = [];
}

function renderPasteZone() {
  var zone = document.getElementById('pasteZone');
  zone.textContent = '';

  // show existing screenshots (from server)
  existingPnlScreenshots.forEach(function(filename, idx) {
    var thumb = document.createElement('div');
    thumb.className = 'thumb';
    var img = document.createElement('img');
    img.src = getScreenshotUrl(filename);
    thumb.appendChild(img);
    var removeBtn = document.createElement('button');
    removeBtn.className = 'thumb-remove';
    removeBtn.textContent = '\u00d7';
    removeBtn.type = 'button';
    removeBtn.addEventListener('click', function(ev) {
      ev.stopPropagation();
      existingPnlScreenshots.splice(idx, 1);
      renderPasteZone();
    });
    thumb.appendChild(removeBtn);
    zone.appendChild(thumb);
  });

  if (existingPnlScreenshots.length === 0 && pendingScreenshots.length === 0) {
    var hint = document.createElement('div');
    hint.className = 'hint';
    hint.textContent = 'Ctrl+V 貼上截圖，或拖放圖片到這裡';
    zone.appendChild(hint);
  }
  pendingScreenshots.forEach(function(dataUrl, idx) {
    var thumb = document.createElement('div');
    thumb.className = 'thumb';
    var img = document.createElement('img');
    img.src = dataUrl;
    thumb.appendChild(img);
    var removeBtn = document.createElement('button');
    removeBtn.className = 'thumb-remove';
    removeBtn.textContent = '\u00d7';
    removeBtn.type = 'button';
    removeBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      pendingScreenshots.splice(idx, 1);
      renderPasteZone();
    });
    thumb.appendChild(removeBtn);
    zone.appendChild(thumb);
  });
  if (pendingScreenshots.length > 0) {
    var addMore = document.createElement('div');
    addMore.className = 'hint';
    addMore.textContent = '繼續貼上更多截圖...';
    addMore.style.fontSize = '11px';
    zone.appendChild(addMore);
  }
}

function serializeRichEditor(el) {
  // walk through child nodes, extract text and images
  var text = '';
  var images = [];
  function walk(node) {
    if (node.nodeType === 3) { // text node
      text += node.textContent;
    } else if (node.nodeName === 'IMG') {
      images.push(node.src);
      text += '\n[screenshot]\n';
    } else if (node.nodeName === 'BR') {
      text += '\n';
    } else if (node.nodeName === 'MARK') {
      text += '[hl]';
      for (var i = 0; i < node.childNodes.length; i++) {
        walk(node.childNodes[i]);
      }
      text += '[/hl]';
      return;
    } else if (node.nodeName === 'DIV' || node.nodeName === 'P') {
      if (text.length > 0 && text[text.length - 1] !== '\n') text += '\n';
      for (var i = 0; i < node.childNodes.length; i++) {
        walk(node.childNodes[i]);
      }
      if (text.length > 0 && text[text.length - 1] !== '\n') text += '\n';
      return;
    }
    if (node.childNodes) {
      for (var i = 0; i < node.childNodes.length; i++) {
        walk(node.childNodes[i]);
      }
    }
  }
  walk(el);
  return { text: text.trim(), images: images };
}

function handleImageFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    pendingScreenshots.push(e.target.result);
    renderPasteZone();
  };
  reader.readAsDataURL(file);
}

function saveEntry() {
  var date = document.getElementById('entryDate').value;
  var loss = document.getElementById('entryLoss').value;
  var mistake = document.getElementById('entryMistake').value.trim();
  var lesson = document.getElementById('entryLesson').value.trim();
  // serialize rich editor: extract text + inline images (preserving order)
  var editorEl = document.getElementById('entryDetail');
  var richContent = serializeRichEditor(editorEl);
  var detail = richContent.text;
  // keep images in original order, track which ones need uploading
  var orderedDetailImages = richContent.images; // [{src, isNew}] in order
  var link = document.getElementById('entryLink').value.trim();
  var account = document.getElementById('entryAccount').value.trim();
  var tags = [];
  var goodTags = [];
  document.querySelectorAll('#tagSelector .tag-option').forEach(function(el) {
    if (el.dataset.state === 'bad') tags.push(el.dataset.tag);
    else if (el.dataset.state === 'good') goodTags.push(el.dataset.tag);
  });

  if (!date || !loss) {
    alert('日期和金額必填！');
    return;
  }

  // sync entry tags to daily tag checklist so calendar updates
  if (tags.length > 0 || goodTags.length > 0) {
    var data = getDailyTagData();
    if (!data[date]) data[date] = {};
    tags.forEach(function(t) { data[date][t] = 'bad'; });
    goodTags.forEach(function(t) { data[date][t] = 'good'; });
    saveDailyTagData(data);
    syncDayToNotion(date);
  }

  var lossNum = parseFloat(loss) || 0;
  var title = (mistake || '').substring(0, 50) || date || 'untitled';

  var saveBtn = document.getElementById('saveBtn');
  saveBtn.disabled = true;
  saveBtn.textContent = '上傳截圖中...';

  // upload all new screenshots to Google Drive (with fallback: skip on auth failure)
  function tryUpload(dataUrl) {
    return uploadScreenshotToDrive(dataUrl).catch(function(err) {
      console.warn('Drive upload failed, skipping screenshot:', err.message);
      return null; // null = skipped
    });
  }
  var pnlUploads = pendingScreenshots.map(tryUpload);
  // upload detail images in order — existing URLs resolve immediately, new ones upload
  var detailUploads = orderedDetailImages.map(function(src) {
    if (src.startsWith('data:')) {
      return tryUpload(src);
    } else {
      return Promise.resolve(src); // already a Drive URL, keep as-is
    }
  });

  var skippedCount = 0;
  Promise.all([Promise.all(pnlUploads), Promise.all(detailUploads)]).then(function(results) {
    var newPnlUrls = results[0].filter(Boolean);
    // detail URLs already in correct order, filter out failed uploads (nulls)
    var allDetailUrls = results[1].filter(Boolean);
    var totalNew = pendingScreenshots.length + orderedDetailImages.filter(function(s){return s.startsWith('data:')}).length;
    var totalUploaded = newPnlUrls.length + (allDetailUrls.length - orderedDetailImages.filter(function(s){return !s.startsWith('data:')}).length);
    skippedCount = totalNew - totalUploaded;
    if (skippedCount < 0) skippedCount = 0;

    var allPnlUrls = existingPnlScreenshots.concat(newPnlUrls);

    var screenshotJson = JSON.stringify({ pnl: allPnlUrls, detail: allDetailUrls });

    saveBtn.textContent = '儲存到 Notion...';

    var notionProps = {
      '名稱': { title: [{ text: { content: title } }] },
      '日期': { date: { start: date } },
      '虧損金額': { number: lossNum },
      '錯誤描述': { rich_text: [{ text: { content: mistake || '' } }] },
      '詳細過程': { rich_text: [{ text: { content: detail || '' } }] },
      '帳號': { rich_text: [{ text: { content: account || '' } }] },
      '連結': { url: link || null },
      '錯誤類型': { multi_select: tags.map(function(t) { return { name: t }; }) },
      '截圖': { rich_text: [{ text: { content: screenshotJson } }] }
    };

    function doSave(props) {
      if (editingId) {
        return notionRequest('PATCH', '/pages/' + editingId, { properties: props });
      } else {
        return notionRequest('POST', '/pages', {
          parent: { database_id: NOTION_DB_ID },
          properties: props
        });
      }
    }
    // always send all 3 new fields (DB properties confirmed to exist)
    notionProps['這天犯的錯'] = { rich_text: lesson ? [{ text: { content: lesson } }] : [] };
    notionProps['mood'] = { rich_text: [{ text: { content: currentMood } }] };
    notionProps['做得好'] = { multi_select: goodTags.map(function(t) { return { name: t }; }) };

    return doSave(notionProps);
  }).then(function() {
    closeModal();
    saveBtn.disabled = false;
    saveBtn.textContent = '刻在牆上';
    if (skippedCount > 0) {
      alert('記錄已儲存，但 ' + skippedCount + ' 張截圖上傳失敗（Google Drive Token 可能過期）。\n可稍後到 Settings 更新 Token 後重新編輯補圖。');
    }
    return loadEntries();
  }).catch(function(err) {
    alert('儲存失敗：' + err.message);
    saveBtn.disabled = false;
    saveBtn.textContent = '刻在牆上';
  });
}

// highlighter button
document.getElementById('hlBtn').addEventListener('click', function() {
  var sel = window.getSelection();
  if (!sel.rangeCount || sel.isCollapsed) return;
  var range = sel.getRangeAt(0);
  var editor = document.getElementById('entryDetail');
  if (!editor.contains(range.commonAncestorContainer)) return;
  // check if already highlighted — toggle off
  var parentMark = sel.anchorNode.parentElement && sel.anchorNode.parentElement.closest('mark');
  if (parentMark) {
    var frag = document.createDocumentFragment();
    while (parentMark.firstChild) frag.appendChild(parentMark.firstChild);
    parentMark.parentNode.replaceChild(frag, parentMark);
    return;
  }
  var mark = document.createElement('mark');
  try {
    range.surroundContents(mark);
  } catch(e) {
    // partial selection across elements — extract and wrap
    var contents = range.extractContents();
    mark.appendChild(contents);
    range.insertNode(mark);
  }
  sel.removeAllRanges();
});

  pasteZone.classList.add('dragover');
});
pasteZone.addEventListener('dragleave', function() {
  pasteZone.classList.remove('dragover');
});
pasteZone.addEventListener('drop', function(e) {
  e.preventDefault();
  pasteZone.classList.remove('dragover');
  var files = e.dataTransfer.files;
  for (var i = 0; i < files.length; i++) {
    handleImageFile(files[i]);
  }
});

// paste handler for rich editor — insert images inline
document.getElementById('entryDetail').addEventListener('paste', function(e) {
  var items = e.clipboardData.items;
  for (var i = 0; i < items.length; i++) {
    if (items[i].type.indexOf('image') !== -1) {
      e.preventDefault();
      var file = items[i].getAsFile();
      var reader = new FileReader();
      reader.onload = function(ev) {
        var img = document.createElement('img');
        img.src = ev.target.result;
        // insert at cursor
        var sel = window.getSelection();
        if (sel.rangeCount) {
          var range = sel.getRangeAt(0);
          range.deleteContents();
          range.insertNode(img);
          // move cursor after image
          range.setStartAfter(img);
          range.collapse(true);
          sel.removeAllRanges();
          sel.addRange(range);
        } else {
          document.getElementById('entryDetail').appendChild(img);
        }
      };
      reader.readAsDataURL(file);
      return;
    }
  }
});

// paste handler for screenshot zone (outside rich editor)
document.addEventListener('paste', function(e) {
  if (!document.getElementById('modal').classList.contains('active')) return;
  // skip if focus is in the rich editor (handled above)
  if (document.activeElement === document.getElementById('entryDetail')) return;
  var items = e.clipboardData.items;
  for (var i = 0; i < items.length; i++) {
    if (items[i].type.indexOf('image') !== -1) {
      e.preventDefault();
      handleImageFile(items[i].getAsFile());
      break;
    }
  }
});
