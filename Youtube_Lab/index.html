    // 時間轉秒數
    function timeToSeconds(timeStr) {
      const parts = timeStr.split(':').map(Number);
      if (parts.length === 2) {
        return parts[0] * 60 + parts[1];
      } else if (parts.length === 3) {
        return parts[0] * 3600 + parts[1] * 60 + parts[2];
      }
      return 0;
    }

    // 解析精華片段
    function parseHighlights(text) {
      if (!text) return [];
      const lines = text.split('\n').filter(line => line.trim());
      return lines.map(line => {
        // Format 1: "0:31-1:02 - description" or "0:31 - description"
        const m1 = line.match(/^(\d+:\d+)(?:-(\d+:\d+))?\s*[-–]\s*(.+)$/);
        if (m1) {
          return { startTime: m1[1], endTime: m1[2] || null, description: m1[3].trim(), startSeconds: timeToSeconds(m1[1]) };
        }
        // Format 2: "0:31 description" (no dash separator)
        const m2 = line.match(/^(\d+:\d+)\s+(.+)$/);
        if (m2) {
          return { startTime: m2[1], endTime: null, description: m2[2].trim(), startSeconds: timeToSeconds(m2[1]) };
        }
        return null;
      }).filter(Boolean);
    }

    // 星星評分組件
    function StarRating({ rating, onRate, size = "text-lg" }) {
      const [hoverRating, setHoverRating] = useState(0);
      
      return (
        <div className="flex gap-0.5">
          {[1, 2, 3, 4, 5].map(star => (
            <button
              key={star}
              onClick={() => onRate(star)}
              onMouseEnter={() => setHoverRating(star)}
              onMouseLeave={() => setHoverRating(0)}
              className={`${size} transition-colors ${
                (hoverRating || rating) >= star ? 'text-yellow-400' : 'text-neutral-600'
              } hover:scale-110`}
            >
              ★
            </button>
          ))}
        </div>
      );
    }

    // 狀態選擇組件
    function StatusSelector({ currentStatus, onStatusChange }) {
      const statusOptions = ["待看", "進行中", "已完成"];
      
      return (
        <div className="flex gap-2">
          {statusOptions.map(status => (
            <button
              key={status}
              onClick={() => onStatusChange(status)}
              className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-all ${
                currentStatus === status
                  ? status === "待看" ? "bg-neutral-700 text-white" :
                    status === "進行中" ? "bg-amber-500/20 text-amber-400 border border-amber-500/30" :
                    "bg-emerald-500/20 text-emerald-400 border border-emerald-500/30"
                  : "bg-neutral-800 text-neutral-400 hover:bg-neutral-700"
              }`}
            >

            </button>
          ))}
        </div>
      );
    }

    // 分類多選組件
    function CategoryMultiSelector({ currentCategories, onCategoriesChange, availableCategories }) {
      const selected = currentCategories ? currentCategories.split(',').map(c => c.trim()).filter(Boolean) : [];

      const toggleCategory = (cat) => {
        let newSelected;
        if (selected.includes(cat)) {
          newSelected = selected.filter(c => c !== cat);
        } else {
          newSelected = [...selected, cat];
        }
        onCategoriesChange(newSelected.join(', '));
      };

      return (
        <div className="flex flex-wrap gap-2">
          {availableCategories.filter(c => c !== "全部").map(cat => (
            <button
              key={cat}
              onClick={() => toggleCategory(cat)}
              className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-all ${
                selected.includes(cat)
                  ? "bg-amber-500/20 text-amber-400 border border-amber-500/30"
                  : "bg-neutral-800 text-neutral-400 hover:bg-neutral-700"
              }`}
            >
              {cat}
            </button>
          ))}
        </div>
      );
    }

    // 語音輸入組件
    function SpeechToText({ onTranscript, isListening, setIsListening }) {
      const recognitionRef = useRef(null);

      useEffect(() => {
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
          const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
          recognitionRef.current = new SpeechRecognition();
          recognitionRef.current.continuous = true;
          recognitionRef.current.interimResults = true;
          recognitionRef.current.lang = 'zh-TW';

          recognitionRef.current.onresult = (event) => {
            let transcript = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
              transcript += event.results[i][0].transcript;
            }
            onTranscript(transcript);
          };

          recognitionRef.current.onerror = (event) => {
            console.error('Speech recognition error:', event.error);
            setIsListening(false);
          };

          recognitionRef.current.onend = () => {
            setIsListening(false);
          };
        }
      }, []);

      const toggleListening = () => {
        if (isListening) {
          recognitionRef.current?.stop();
          setIsListening(false);
        } else {
          recognitionRef.current?.start();
          setIsListening(true);
        }
      };

      if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
        return null;
      }

      return (
        <button
          onClick={toggleListening}
          className={`p-2 rounded-lg transition-all ${
            isListening 
              ? 'bg-red-500 text-white animate-pulse' 
              : 'bg-neutral-700 text-neutral-400 hover:bg-neutral-600'
          }`}
          title={isListening ? '停止錄音' : '語音輸入'}
        >
          🎤
        </button>
      );
    }

    function VideoModal({ video, onClose, onUpdate, onDelete, getThumbnail }) {

      const [selectedCategories, setSelectedCategories] = useState(video.category || "");
      const [notes, setNotes] = useState(video.notes || "");
      const [thumbnailSaved, setThumbnailSaved] = useState(video.thumbnailSaved || false);
      const [isListening, setIsListening] = useState(false);
      const [tempTranscript, setTempTranscript] = useState("");
      const [isUpdating, setIsUpdating] = useState(false);
      const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
      const [isDeleting, setIsDeleting] = useState(false);
      const [currentTime, setCurrentTime] = useState(0);
      const [isSavingNotes, setIsSavingNotes] = useState(false);
      const iframeRef = useRef(null);

      const getVideoId = (url) => {
        if (!url) return null;
        // youtube.com/watch?v=ID
        let match = url.match(/[?&]v=([^&]+)/);
        if (match) return match[1];
        // youtu.be/ID
        match = url.match(/youtu\.be\/([^?&/]+)/);
        if (match) return match[1];
        // youtube.com/embed/ID 或 youtube.com/shorts/ID
        match = url.match(/youtube\.com\/(?:embed|shorts)\/([^?&/]+)/);
        if (match) return match[1];
        return null;
      };

      const videoId = getVideoId(video.url);
      const highlights = parseHighlights(video.highlights);
      const [shouldAutoplay, setShouldAutoplay] = useState(false);

      const seekTo = (seconds) => {
        setCurrentTime(seconds);
        setShouldAutoplay(true);
      };

      const youtubeUrl = videoId 
        ? `https://www.youtube.com/embed/${videoId}${currentTime > 0 ? `?start=${currentTime}` : ''}${shouldAutoplay ? (currentTime > 0 ? '&' : '?') + 'autoplay=1' : ''}`
        : '';

      const handleRatingChange = async (newRating) => {
        setRating(newRating);
        setIsUpdating(true);
        try {
          await fetch(UPDATE_API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              pageId: video.id,
              rating: newRating,
              status: status
            })
          });
          onUpdate(video.id, { rating: newRating, status });
        } catch (err) {
          console.error('Error updating rating:', err);
        }
        setIsUpdating(false);
      };

        setIsUpdating(true);

        setIsUpdating(true);

          await fetch(UPDATE_API_URL, {

              categories: newCategories

              pageId: video.id,
              notes: notes

      const handleThumbnailSaveToggle = async () => {

        try {

          const videoId = getVideoId(video.url);

        };

        return () => window.removeEventListener('keydown', handleEsc);
      }, [onClose]);

              onClick={onClose}

              <div className="flex gap-2 text-xs text-neutral-500 mb-2">

                <span>•</span>
                <span>{video.channel}</span>
              </div>
              <h2 className="text-lg font-semibold text-white pr-8 leading-snug">
                {video.title}
              </h2>
            </div>

            {/* 影片播放器 */}
            <div className="p-6 pb-4">
              {videoId ? (
                <div className="aspect-video bg-black rounded-xl overflow-hidden">
                  <iframe
                    ref={iframeRef}
                    key={currentTime}
                    src={youtubeUrl}
                    className="w-full h-full"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowFullScreen
                  />
                </div>
              ) : (
                <div className="aspect-video bg-neutral-800 rounded-xl flex items-center justify-center">
                  <span className="text-neutral-500">無法載入影片</span>
                </div>
              )}
              
              {/* 縮圖操作按鈕 */}
              <div className="flex gap-2 mt-3">
                <button
                  onClick={handleThumbnailSaveToggle}
                  className={`flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium transition-all ${
                    thumbnailSaved

                  }`}

            {/* 精華片段 */}

    // 平台嵌入組件 — 自動偵測 URL 類型，嵌入原始貼文/影片
    function PlatformEmbed({ url }) {
      const containerRef = useRef(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(false);
      const mountedRef = useRef(true);
      const loadedRef = useRef(false);

      const embedInfo = useMemo(() => {
        if (!url) return null;
        // X/Twitter
        const tweetMatch = url.match(/https?:\/\/(?:twitter\.com|x\.com)\/\w+\/status\/(\d+)/);
        if (tweetMatch) return { type: 'twitter', tweetId: tweetMatch[1] };
        // Instagram
        if (url.match(/https?:\/\/(?:www\.)?instagram\.com\/(p|reel)\//)) return { type: 'instagram' };
        // YouTube
        const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]+)/);
        if (ytMatch) return { type: 'youtube', videoId: ytMatch[1] };
        return null;
      }, [url]);

      useEffect(() => {
        mountedRef.current = true;
        loadedRef.current = false;

        if (!embedInfo || embedInfo.type === 'youtube') {
          setLoading(false);
          loadedRef.current = true;
          return;
        }

        // 超時 fallback
        const timer = setTimeout(() => {
          if (mountedRef.current && !loadedRef.current) {
            setError(true);
            setLoading(false);
          }
        }, 15000);

        // 載入外部 script（如果還沒載入）
        const ensureScript = (src) => {
          if (!document.querySelector(`script[src="${src}"]`)) {
            const s = document.createElement('script');
            s.src = src;
            s.async = true;
            document.body.appendChild(s);
          }
        };

        if (embedInfo.type === 'twitter') {
          ensureScript('https://platform.twitter.com/widgets.js');
          // 等 twttr 載入完成，再建立推文嵌入
          const poll = setInterval(() => {
            if (window.twttr?.widgets?.createTweet && containerRef.current) {
              clearInterval(poll);
              // 安全清空容器
              while (containerRef.current.firstChild) {
                containerRef.current.removeChild(containerRef.current.firstChild);
              }
              window.twttr.widgets.createTweet(
                embedInfo.tweetId,
                containerRef.current,
                { theme: 'dark', conversation: 'none', dnt: true }
              ).then((el) => {
                if (mountedRef.current) {
                  loadedRef.current = true;
                  setLoading(false);
                  if (!el) setError(true); // createTweet 回傳 null 表示推文不存在
                }
              }).catch(() => {
                if (mountedRef.current) {
                  loadedRef.current = true;
                  setError(true);
                  setLoading(false);
                }
              });
            }
          }, 200);
          return () => { mountedRef.current = false; clearInterval(poll); clearTimeout(timer); };
        }

        if (embedInfo.type === 'instagram') {
          ensureScript('https://www.instagram.com/embed.js');
          const poll = setInterval(() => {
            if (window.instgrm?.Embeds?.process) {
              clearInterval(poll);
              window.instgrm.Embeds.process();
              if (mountedRef.current) {
                loadedRef.current = true;
                setLoading(false);
              }
            }
          }, 200);
          return () => { mountedRef.current = false; clearInterval(poll); clearTimeout(timer); };
        }

        return () => { mountedRef.current = false; clearTimeout(timer); };
      }, [embedInfo]);

      if (!embedInfo) return null;

      return (
        <div className="px-6 pb-4">
          <div className="bg-neutral-800/30 rounded-xl p-4 border border-neutral-800 overflow-hidden">
            <div className="text-sm font-medium text-neutral-400 mb-3">👁️ 原始貼文預覽</div>

            {loading && !error && (
              <div className="flex items-center justify-center py-8">
                <div className="animate-pulse text-neutral-500 text-sm">載入嵌入內容中...</div>
              </div>
            )}

            {error && (
              <div className="text-center py-4">
                <div className="text-neutral-500 text-sm mb-2">無法載入嵌入預覽</div>
                <a href={url} target="_blank" rel="noopener noreferrer" className="text-sm text-amber-400 hover:underline">
                  點擊開啟原始連結 →
                </a>
              </div>
            )}

            {embedInfo.type === 'twitter' && (
              <div ref={containerRef} className="flex justify-center [&>*]:!mt-0 [&>*]:!mb-0" />
            )}

            {embedInfo.type === 'instagram' && (
              <div ref={containerRef} className="flex justify-center">
                <blockquote
                  className="instagram-media"
                  data-instgrm-permalink={url}
                  data-instgrm-version="14"
                  style={{ maxWidth: '540px', width: '100%', margin: '0 auto' }}
                />
              </div>
            )}

            {embedInfo.type === 'youtube' && (
              <div className="aspect-video rounded-lg overflow-hidden">
                <iframe
                  src={'https://www.youtube.com/embed/' + embedInfo.videoId}
                  className="w-full h-full"
                  frameBorder="0"
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                  allowFullScreen
                />
              </div>
            )}
          </div>
        </div>
      );
    }

    // QuickCapture 表單組件
    function QuickCapture({ onAdd }) {
      const [isOpen, setIsOpen] = useState(false);
      const [url, setUrl] = useState("");
      const [content, setContent] = useState("");
      const [sourceType, setSourceType] = useState("X");
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [submitStatus, setSubmitStatus] = useState(""); // 顯示送出進度
      const [submitError, setSubmitError] = useState(""); // 顯示錯誤訊息

      // 自動偵測 URL 類型
      const isIgUrl = useMemo(() => url.toLowerCase().includes('instagram.com'), [url]);
      const isXUrl = useMemo(() => url.toLowerCase().includes('x.com') || url.toLowerCase().includes('twitter.com'), [url]);
      // X/Twitter 和 Instagram 都支援自動抓取（IG 透過 Apify）
      const isAutoFetchUrl = isXUrl || isIgUrl;

      // URL 變更時自動偵測來源類型
      const handleUrlChange = (newUrl) => {
        setUrl(newUrl);
        setSubmitError("");
        const u = newUrl.toLowerCase();
        if (u.includes('instagram.com')) {
          setSourceType('Instagram');
        } else if (u.includes('x.com') || u.includes('twitter.com')) {
          setSourceType('X');
        } else if (u.includes('youtube.com') || u.includes('youtu.be')) {
          setSourceType('YouTube');
        }
      };

      // 判斷是否可以送出：X URL 只需 URL、其他需要內容
      const canSubmit = isAutoFetchUrl ? url.trim().length > 0 : content.trim().length > 0;

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!canSubmit) return;

        setIsSubmitting(true);
        setSubmitError("");

        // X/IG URL 走伺服器端抓取
        if (isAutoFetchUrl) {
          setSubmitStatus(isXUrl ? "正在抓取推文內容..." : "正在透過 Apify 抓取 IG 貼文...");
        } else {
          setSubmitStatus("正在送出給 AI 分析...");
        }

        const payload = {
          type: "add_resource",
          data: {
            url: url.trim(),
            content: content.trim(), // IG/X 可以是空字串，n8n 會自動抓取
            source_type: sourceType,
            source: "manual",
          }
        };

        try {
          console.log("📤 送出 Resource payload:", JSON.stringify(payload, null, 2));
          setSubmitStatus("AI 正在分析分類中...");
          const res = await fetch(RESOURCE_WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const data = await res.json();

          // 檢查回傳是否有效
          if (data.error) {
            throw new Error(data.error);
          }

          onAdd(data);
          setUrl("");
          setContent("");
          setSourceType("X");
          setIsOpen(false);
          setSubmitStatus("");
        } catch (err) {
          console.error('新增資源失敗:', err);
          if (isAutoFetchUrl && !content.trim()) {
            setSubmitError(isXUrl ? "無法自動抓取推文內容，請手動複製推文文字貼到內容欄位" : "無法自動抓取 IG 貼文，請手動複製貼文內容貼到內容欄位");
          } else {
            setSubmitError("送出失敗，請稍後再試");
          }
          setSubmitStatus("");
        }
        setIsSubmitting(false);
      };

      return (
        <div className="mb-6">
          <button
            onClick={() => setIsOpen(!isOpen)}
            className="flex items-center gap-2 px-4 py-2.5 rounded-xl bg-neutral-800 hover:bg-neutral-700 text-neutral-300 text-sm font-medium transition-colors w-full sm:w-auto"
          >
            {isOpen ? "✕ 收合" : "➕ 快速收集"}
          </button>

          {isOpen && (
            <form onSubmit={handleSubmit} className="mt-3 bg-neutral-900 border border-neutral-800 rounded-xl p-4 space-y-3">
              {/* 來源類型 */}
              <div className="flex gap-2 flex-wrap">
                {sourceTypes.map(st => (
                  <button
                    key={st.value}
                    type="button"
                    onClick={() => setSourceType(st.value)}
                    className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-all ${
                      sourceType === st.value
                        ? "bg-white text-black"
                        : "bg-neutral-800 text-neutral-400 hover:bg-neutral-700"
                    }`}
                  >
                    {st.icon} {st.label}
                  </button>
                ))}
              </div>

              {/* URL — 放在最上面，優先輸入 */}
              <div>
                <input
                  type="url"
                  placeholder="貼上 URL（X / IG 連結會自動抓取內容）"
                  value={url}
                  onChange={e => handleUrlChange(e.target.value)}
                  className="w-full px-4 py-2.5 rounded-lg border border-neutral-800 bg-neutral-950 text-neutral-200 text-sm outline-none focus:border-neutral-600 transition-colors placeholder-neutral-600"
                />
                {/* URL 類型偵測提示 */}
                {isXUrl && (
                  <div className="mt-1.5 flex items-center gap-1.5 text-xs">
                    <span className="inline-block w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse" />
                    <span className="text-green-400/80">系統會自動抓取推文內容，不用手動貼</span>
                  </div>
                )}
                {isIgUrl && (
                  <div className="mt-1.5 flex items-center gap-1.5 text-xs">
                    <span className="inline-block w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse" />
                    <span className="text-green-400/80">系統會透過 Apify 自動抓取 IG 貼文內容，不用手動貼</span>
                  </div>
                )}
              </div>

              {/* 內容 — 只有 X URL 時為選填，IG 和其他都必填 */}
              <textarea
                placeholder={isAutoFetchUrl
                  ? "內容（選填 — 系統會自動抓取推文）"
                  : isIgUrl
                    ? "請複製 IG 貼文內容貼在這裡...（必填）"
                    : "貼上內容或寫下筆記...（必填）"}
                value={content}
                onChange={e => { setContent(e.target.value); setSubmitError(""); }}
                rows={isAutoFetchUrl && !content ? 2 : 4}
                className="w-full px-4 py-3 rounded-lg border border-neutral-800 bg-neutral-950 text-neutral-200 text-sm outline-none focus:border-neutral-600 transition-colors placeholder-neutral-600 resize-none"
              />

              {/* 錯誤訊息 */}
              {submitError && (
                <div className="text-sm text-red-400 bg-red-400/10 border border-red-400/20 rounded-lg px-3 py-2">
                  {submitError}
                </div>
              )}

              {/* 送出進度 */}
              {isSubmitting && submitStatus && (
                <div className="flex items-center gap-2 text-sm text-neutral-400">
                  <span className="inline-block w-3 h-3 border-2 border-neutral-500 border-t-white rounded-full animate-spin" />
                  {submitStatus}
                </div>
              )}

              {/* 送出按鈕 */}
              <button
                type="submit"
                disabled={!canSubmit || isSubmitting}
                className="px-6 py-2.5 rounded-xl bg-white text-black font-medium text-sm hover:bg-neutral-200 transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
              >
                {isSubmitting ? "處理中..." : isAutoFetchUrl ? (isXUrl ? "自動抓取推文並分析" : "自動抓取 IG 貼文並分析") : "送出給 AI 分類"}
              </button>
            </form>
          )}
        </div>
      );
    }

    // ResourceLibrary 主容器組件
    function ResourceLibrary() {
      const [resources, setResources] = useState([]);
      const [loading, setLoading] = useState(true);
      const [searchQuery, setSearchQuery] = useState("");
      const [selectedCategory, setSelectedCategory] = useState("全部");
      const [selectedResource, setSelectedResource] = useState(null);


      // 初始化：從 localStorage 讀取快取，同時從 webhook 拉取最新
      useEffect(() => {
        // 先從快取載入
        const cached = localStorage.getItem(RESOURCE_CACHE_KEY);
        if (cached) {
          try {
            setResources(JSON.parse(cached));
          } catch (e) {
            console.error("快取解析失敗:", e);
          }
        }

        // 從 webhook 拉取最新資料
        const fetchResources = async () => {
          try {
            const res = await fetch(RESOURCE_WEBHOOK_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ type: "fetch_resources" })
            });
            const data = await res.json();
            if (Array.isArray(data)) {
              setResources(data);
              localStorage.setItem(RESOURCE_CACHE_KEY, JSON.stringify(data));
            }
          } catch (err) {
            console.log("⚠️ Webhook 未連接，使用 mock/快取資料");
            // 如果沒有快取也沒有 webhook，載入 mock 資料
            if (!cached) {
              setResources(MOCK_RESOURCES);
              localStorage.setItem(RESOURCE_CACHE_KEY, JSON.stringify(MOCK_RESOURCES));
            }
          }
          setLoading(false);
        };

        fetchResources();
      }, []);

      // 新增資源
      const handleAdd = (newResource) => {
        setResources(prev => {
          const updated = [newResource, ...prev];
          localStorage.setItem(RESOURCE_CACHE_KEY, JSON.stringify(updated));
          return updated;
        });
      };

      // 刪除資源
      const handleDelete = (resourceId) => {
        setResources(prev => {
          const updated = prev.filter(r => r.id !== resourceId);
          localStorage.setItem(RESOURCE_CACHE_KEY, JSON.stringify(updated));
          return updated;
        });
      };

      // 篩選邏輯
      const filteredResources = useMemo(() => {
        return resources.filter(r => {
          const matchCategory = selectedCategory === "全部" ||
            (r.tags || []).some(tag => tag.includes(selectedCategory));
          const query = searchQuery.toLowerCase();
          const matchSearch = !query ||
            (r.title || "").toLowerCase().includes(query) ||
            (r.summary || "").toLowerCase().includes(query) ||
            (r.content || "").toLowerCase().includes(query) ||
            (r.key_takeaway || "").toLowerCase().includes(query);
          return matchCategory && matchSearch;
        });
      }, [resources, selectedCategory, searchQuery]);

      return (
        <main className="max-w-6xl mx-auto px-4 py-4">
          {/* QuickCapture */}
          <QuickCapture onAdd={handleAdd} />

          {/* 篩選列 */}
          <div className="flex flex-col gap-3 mb-6">
            {/* 搜尋 */}
            <input
              type="text"
              placeholder="搜尋摘要、內容..."
              value={searchQuery}
              onChange={e => setSearchQuery(e.target.value)}
              className="w-full sm:w-56 px-4 py-2 rounded-lg border border-neutral-800 bg-neutral-900 text-neutral-200 text-sm outline-none focus:border-neutral-600 transition-colors placeholder-neutral-600"
            />

            {/* 分類標籤篩選 */}
            <div className="flex flex-wrap gap-1 items-center">
              {resourceCategories.map(cat => (
                <button
                  key={cat.label}
                  onClick={() => setSelectedCategory(cat.label)}
                  className={`px-3 py-1.5 rounded-md text-sm whitespace-nowrap transition-colors ${
                    selectedCategory === cat.label
                      ? "bg-neutral-800 text-white font-medium"
                      : "text-neutral-400 hover:text-white"
                  }`}
                >
                  {cat.emoji} {cat.label}
                </button>
              ))}

              <div className="hidden sm:block h-4 w-px bg-neutral-800 mx-1"></div>
              <span className="text-sm text-neutral-500">
                共 <span className="text-white font-medium">{filteredResources.length}</span> 筆
              </span>

              {(selectedCategory !== "全部" || searchQuery) && (
                <button
                  onClick={() => { setSelectedCategory("全部"); setSearchQuery(""); }}
                  className="px-3 py-1.5 rounded-md text-sm text-red-400 hover:bg-red-500/10 transition-colors"
                >
                  ✕ 清除篩選
                </button>
              )}
            </div>
          </div>

          {/* 資源卡片 Grid */}
          {loading ? (
            <div className="text-center py-16">
              <div className="animate-spin w-8 h-8 border-2 border-white border-t-transparent rounded-full mx-auto mb-4"></div>
              <p className="text-neutral-500">載入資源中...</p>
            </div>
          ) : filteredResources.length > 0 ? (
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              {filteredResources.map(resource => (
                <ResourceCard key={resource.id} resource={resource} onDelete={handleDelete} onOpenModal={setSelectedResource} />
              ))}
            </div>
          ) : (
            <div className="text-center py-16">
              <p className="text-neutral-500 mb-2">
                {resources.length === 0 ? "還沒有收集任何資源" : "找不到符合條件的資源"}
              </p>
              <p className="text-neutral-600 text-sm">
                {resources.length === 0 ? "點「快速收集」開始新增" : "試試調整篩選條件"}
              </p>
            </div>
          )}

          {/* Resource Modal */}
          {selectedResource && (
            <ResourceModal
              resource={selectedResource}
              onClose={() => setSelectedResource(null)}
              onDelete={handleDelete}
            />
          )}
        </main>
      );
    }

        fetch(API_URL)

                category = props['分類'].select.name;
              }
              
              return {
                id: item.id || index,
                title: props['影片標題']?.title?.[0]?.plain_text || '無標題',
                channel: props['頻道']?.rich_text?.[0]?.plain_text || '',
                duration: props['影片長度']?.rich_text?.[0]?.plain_text || '',
                category: category,
                status: props['狀態']?.select?.name || '待看',
                priority: props['優先度']?.select?.name || '',
                thumbnail: props['縮圖網址']?.url || '',
                url: props['網址']?.url || '',

                thumbnailSaved: props['收藏縮圖']?.checkbox || false,
                createdTime: item.created_time || '',
              };
            });

          return matchCategory && matchStatus && matchSearch && matchThumbnailSaved && matchRating;

                  <button
                    onClick={() => window.location.reload()}
                    className="bg-neutral-800 text-white font-medium px-4 py-2 rounded-lg text-sm hover:bg-neutral-700 transition-colors"
                  >
                    🔄 刷新
                  </button>
                  <a
                    href="https://www.notion.so/76fb8600ae9649bcb6c475f75f0ec818"
                    target="_blank"
                    rel="noopener noreferrer"
                    className="bg-white text-black font-medium px-4 py-2 rounded-lg text-sm hover:bg-neutral-200 transition-colors hidden sm:block"
                  >
                    Notion →
                  </a>
                </div>
              </div>

              {/* Tab 切換 */}
              <div className="flex gap-1 mb-3 bg-neutral-900 rounded-lg p-1 w-fit">
                <button
                  onClick={() => setActiveTab("youtube")}
                  className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${
                    activeTab === "youtube"
                      ? "bg-neutral-700 text-white"
                      : "text-neutral-400 hover:text-white"
                  }`}
                >
                  🎬 YouTube Lab
                </button>
                <button
                  onClick={() => setActiveTab("resources")}
                  className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${
                    activeTab === "resources"
                      ? "bg-neutral-700 text-white"
                      : "text-neutral-400 hover:text-white"
                  }`}
                >
                  📦 Resource Library
                </button>
              </div>

              {/* Stats — 只在 YouTube tab 顯示 */}
              {activeTab === "youtube" && <div className="flex gap-4 sm:gap-6 text-sm overflow-x-auto pb-2">
                <span className="text-neutral-400 whitespace-nowrap">總共 <span className="text-white font-medium">{stats.total}</span></span>
                <span className="text-neutral-400 whitespace-nowrap">待看 <span className="text-white font-medium">{stats.pending}</span></span>
                <span className="text-neutral-400 whitespace-nowrap">進行中 <span className="text-white font-medium">{stats.inProgress}</span></span>
                <span className="text-neutral-400 whitespace-nowrap">已完成 <span className="text-white font-medium">{stats.completed}</span></span>
                <span className="text-neutral-400 whitespace-nowrap">已整理 <span className="text-white font-medium">{stats.summarized}</span></span>
                <button 
                  onClick={() => setShowSavedThumbnailsOnly(!showSavedThumbnailsOnly)}
                  className={`whitespace-nowrap transition-colors ${
                    showSavedThumbnailsOnly 
                      ? 'text-pink-400 font-medium' 
                      : 'text-neutral-400 hover:text-pink-400'
                  }`}
                >
                  ❤️ 縮圖收藏 <span className={showSavedThumbnailsOnly ? 'text-pink-400' : 'text-white font-medium'}>{stats.thumbnailSaved}</span>
                </button>
              </div>}
            </div>
          </header>

          {/* YouTube Tab 內容 */}
          {activeTab === "youtube" && (
            <>
              <main className="max-w-6xl mx-auto px-4 py-4">
                {/* Filters */}
                <div className="flex flex-col gap-3 mb-6">
                  {/* 第一列：搜尋 + 分類 + 狀態 */}
                  <div className="flex flex-col sm:flex-row gap-3">
                    <input
                      type="text"
                      placeholder="搜尋..."
                      value={searchQuery}
                      onChange={e => setSearchQuery(e.target.value)}
                      className="w-full sm:w-48 px-4 py-2 rounded-lg border border-neutral-800 bg-neutral-900 text-neutral-200 text-sm outline-none focus:border-neutral-600 transition-colors placeholder-neutral-600"
                    />

                    <div className="flex gap-1 overflow-x-auto pb-2 sm:pb-0">
                      {categories.map(cat => (
                        <button
                          key={cat}
                          onClick={() => setSelectedCategory(cat)}
                          className={`px-3 py-1.5 rounded-md text-sm whitespace-nowrap transition-colors ${
                            selectedCategory === cat
                              ? 'bg-white text-black font-medium'
                              : 'text-neutral-400 hover:text-white'
                          }`}
                        >
                          {cat}
                        </button>
                      ))}
                    </div>

                    <div className="hidden sm:block h-4 w-px bg-neutral-800 self-center"></div>

                    <div className="flex gap-1 overflow-x-auto pb-2 sm:pb-0">
                      {statuses.map(status => (
                        <button
                          key={status}
                          onClick={() => setSelectedStatus(status)}
                          className={`px-3 py-1.5 rounded-md text-sm whitespace-nowrap transition-colors ${
                            selectedStatus === status
                              ? 'bg-neutral-800 text-white font-medium'
                              : 'text-neutral-400 hover:text-white'
                          }`}
                        >
                          {status}
                        </button>
                      ))}
                    </div>
                  </div>

                  {/* 第二列：星號篩選 + 篩選計數 + 清除 */}
                  <div className="flex flex-wrap items-center gap-3">
                    <span className="text-xs text-neutral-500">評分</span>
                    <div className="flex gap-1">
                      {[1, 2, 3, 4, 5].map(star => (
                        <button
                          key={star}
                          onClick={() => setSelectedRatings(prev =>
                            prev.includes(star) ? prev.filter(s => s !== star) : [...prev, star]
                          )}
                          className={`px-2.5 py-1.5 rounded-md text-sm whitespace-nowrap transition-colors ${
                            selectedRatings.includes(star)
                              ? 'bg-yellow-500/20 text-yellow-400 font-medium border border-yellow-500/40'
                              : 'text-neutral-400 hover:text-yellow-400'
                          }`}
                        >
                          {star}★
                        </button>
                      ))}
                    </div>

                    <div className="hidden sm:block h-4 w-px bg-neutral-800"></div>

                    <span className="text-sm text-neutral-500">
                      共 <span className="text-white font-medium">{filteredVideos.length}</span> 部
                    </span>

                    {(selectedCategory !== "全部" || selectedStatus !== "全部" || searchQuery || showSavedThumbnailsOnly || selectedRatings.length > 0) && (
                      <button
                        onClick={() => {
                          setSelectedCategory("全部");
                          setSelectedStatus("全部");
                          setSearchQuery("");
                          setShowSavedThumbnailsOnly(false);
                          setSelectedRatings([]);
                        }}
                        className="px-3 py-1.5 rounded-md text-sm text-red-400 hover:bg-red-500/10 transition-colors"
                      >
                        ✕ 清除篩選
                      </button>
                    )}
                  </div>
                </div>

                {/* Video Grid */}
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                  {filteredVideos.map(video => (
                    <VideoCard
                      key={video.id}
                      video={video}
                      getThumbnail={getThumbnail}
                      onOpenModal={setSelectedVideo}
                    />
                  ))}
                </div>

                {filteredVideos.length === 0 && !loading && (
                  <div className="text-center py-16">
                    <p className="text-neutral-500">找不到符合條件的影片</p>
                  </div>
                )}
              </main>

              {/* Telegram Hint */}
              <a
                href="https://t.me/YT_video_DB_bot"
                target="_blank"
                rel="noopener noreferrer"
                className="fixed bottom-6 right-6 bg-neutral-800 hover:bg-neutral-700 rounded-full px-4 py-2 flex items-center gap-2 transition-colors border border-neutral-700"
              >
                <span>✈️</span>
                <span className="text-sm text-neutral-300">新增影片</span>
              </a>
            </>
          )}

          {/* Resource Library Tab 內容 */}
          {activeTab === "resources" && <ResourceLibrary />}

          {/* Video Modal */}
          {selectedVideo && (
            <VideoModal 
              video={selectedVideo}
              onClose={() => setSelectedVideo(null)}
              onUpdate={handleVideoUpdate}
              onDelete={handleVideoDelete}
              getThumbnail={getThumbnail}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
