# launchd daily task → marker file mtime watchdog config
# Phase 0 audit 2026-05-25: 19 daily tasks, all priority A (plist already has StandardOutPath)
# 不放 com.aios.rayos-health-check（watchdog 自己）
# priority: A=existing log path / B=added StandardOutPath / C=script edit (none this round)
#
# marker_path convention: prefer .err over .log because Python's logging module
# writes to stderr by default; .log stays size=0 with frozen mtime → false stale.
# 2026-05-28: 6 dead .log markers migrated to .err (the May 25 false-alarm batch).

tasks:
